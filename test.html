<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-item { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Deployment Test Results</h1>
    
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function addResult(message, isSuccess = true) {
            const div = document.createElement('div');
            div.className = `test-item ${isSuccess ? 'success' : 'error'}`;
            div.textContent = message;
            results.appendChild(div);
        }
        
        // Test 1: Check if main index.html exists
        fetch('index.html')
            .then(response => {
                if (response.ok) {
                    addResult('✅ index.html loads successfully');
                } else {
                    addResult('❌ index.html failed to load', false);
                }
            })
            .catch(() => addResult('❌ index.html not found', false));
        
        // Test 2: Check if logo exists
        fetch('denovoplace_logo2.png')
            .then(response => {
                if (response.ok) {
                    addResult('✅ Logo image loads successfully');
                } else {
                    addResult('❌ Logo image failed to load', false);
                }
            })
            .catch(() => addResult('❌ Logo image not found', false));
        
        // Test 3: Check if favicon exists
        fetch('favicon/favicon.ico')
            .then(response => {
                if (response.ok) {
                    addResult('✅ Favicon loads successfully');
                } else {
                    addResult('❌ Favicon failed to load', false);
                }
            })
            .catch(() => addResult('❌ Favicon not found', false));
        
        // Test 4: Check if food images exist
        fetch('food images/breakfast.PNG')
            .then(response => {
                if (response.ok) {
                    addResult('✅ Food images load successfully');
                } else {
                    addResult('❌ Food images failed to load', false);
                }
            })
            .catch(() => addResult('❌ Food images not found', false));
        
        addResult('🔍 Testing deployment structure...');
    </script>
</body>
</html>
